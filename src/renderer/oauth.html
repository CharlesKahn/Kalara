<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="styles.css">
<style>
  body {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 40px;
    user-select: none;
    -webkit-app-region: drag;
    background: var(--card-bg);
    animation: appear 200ms ease-out;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--text-secondary);
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
    text-align: center;
    margin-bottom: 10px;
  }

  .sub {
    font-size: 12.5px;
    color: var(--text-secondary);
    text-align: center;
    line-height: 1.6;
    margin-bottom: 30px;
    max-width: 300px;
  }

  .btn-google {
    -webkit-app-region: no-drag;
    display: flex;
    align-items: center;
    gap: 10px;
    background: white;
    color: #1a1a2e;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 20px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    justify-content: center;
    transition: opacity 0.12s;
    margin-bottom: 12px;
  }
  .btn-google:hover { opacity: 0.88; }

  .google-icon {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  .btn-skip {
    -webkit-app-region: no-drag;
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 12px;
    cursor: pointer;
    padding: 6px;
    transition: color 0.12s;
    opacity: 0.7;
  }
  .btn-skip:hover { opacity: 1; }

  .perms {
    margin-top: 20px;
    font-size: 11px;
    color: var(--text-secondary);
    opacity: 0.5;
    text-align: center;
    line-height: 1.5;
  }

  .error-msg {
    margin-top: 10px;
    font-size: 11.5px;
    color: #f87171;
    text-align: center;
    display: none;
  }
</style>
</head>
<body>

<div class="logo">Kalara</div>

<h1>Connect Google Account</h1>
<p class="sub">Lets Kalara detect upcoming Google Meet calls and show participant profiles during calls.</p>

<button class="btn-google" id="btnConnect">
  <svg class="google-icon" viewBox="0 0 24 24">
    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
  </svg>
  Sign in with Google
</button>

<button class="btn-skip" id="btnSkip">Skip for now</button>

<p class="perms">Reads your name, email, profile photo, and calendar (read-only).</p>
<p class="error-msg" id="oauthError"></p>

<script>
  document.getElementById('btnConnect').addEventListener('click', () => {
    document.getElementById('oauthError').style.display = 'none';
    window.brioAPI.startGoogleAuth();
  });

  window.brioAPI.onOauthError(() => {
    const el = document.getElementById('oauthError');
    el.textContent = 'Setup required: add GOOGLE_CLIENT_ID to .env';
    el.style.display = '';
  });
  document.getElementById('btnSkip').addEventListener('click', () => {
    window.brioAPI.closeOAuthWindow();
  });

  // Theme
  window.brioAPI.getConfig().then(c => document.documentElement.setAttribute('data-theme', c?.theme || 'dark')).catch(() => {});
  window.brioAPI.onThemeChange(t => document.documentElement.setAttribute('data-theme', t));
</script>
</body>
</html>
