<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="styles.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: transparent;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .toast {
    width: 100%;
    height: 100%;
    background: rgba(18, 18, 26, 0.96);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .toast-body {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 14px;
    min-width: 0;
  }

  .toast-icon { font-size: 15px; flex-shrink: 0; }

  .toast-text {
    flex: 1;
    font-size: 12.5px;
    color: rgba(255,255,255,0.75);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }

  .toast-title {
    font-weight: 500;
    color: rgba(255,255,255,0.92);
  }

  .toast-error {
    color: #f87171;
    font-size: 11px;
  }

  .btn-cancel {
    padding: 4px 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    color: rgba(255,255,255,0.55);
    font-size: 11px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.12s;
  }
  .btn-cancel:hover {
    background: rgba(239,68,68,0.15);
    border-color: rgba(239,68,68,0.3);
    color: #f87171;
  }

  .progress-track {
    height: 2px;
    background: rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  .progress-bar {
    height: 100%;
    background: var(--accent-blue, #6366f1);
    width: 100%;
    transition: width 10s linear;
  }
</style>
</head>
<body>

<div class="toast">
  <div class="toast-body">
    <span class="toast-icon">🤖</span>
    <div class="toast-text" id="toastText">Auto-joining <span class="toast-title" id="meetingTitle">…</span></div>
    <button class="btn-cancel" id="btnCancel">Cancel</button>
  </div>
  <div class="progress-track">
    <div class="progress-bar" id="progressBar"></div>
  </div>
</div>

<script>
  document.getElementById('btnCancel').addEventListener('click', () => {
    window.brioAPI.cancelAutoJoin();
    window.close();
  });

  window.brioAPI.onAutoJoinToast((data) => {
    document.getElementById('meetingTitle').textContent = data.title || 'meeting';
  });

  window.brioAPI.onAutoJoinError((msg) => {
    document.getElementById('toastText').innerHTML =
      `<span class="toast-error">Failed to join: ${msg}</span>`;
    document.getElementById('btnCancel').textContent = 'Close';
  });

  // Drain progress bar over 10s then close
  requestAnimationFrame(() => {
    document.getElementById('progressBar').style.width = '0%';
  });
  setTimeout(() => window.close(), 10000);

  window.brioAPI.getConfig()
    .then(c => document.documentElement.setAttribute('data-theme', c?.theme || 'dark'))
    .catch(() => {});
</script>
</body>
</html>
