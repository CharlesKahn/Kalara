<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="styles.css">
<style>
  body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-size: 12px;
    color: var(--text-primary);
    overflow: hidden;
    user-select: none;
  }
  .list {
    padding: 4px;
    max-height: 192px;
    overflow-y: auto;
    background: var(--inset-bg);
    border: 1px solid var(--glass-border);
    border-radius: 7px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.35);
  }
  .item {
    display: block;
    width: 100%;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text-primary);
    background: none;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    text-align: left;
    transition: background 0.12s;
  }
  .item:hover { background: rgba(255,255,255,0.06); }
  .item.selected { background: rgba(59,130,246,0.12); color: var(--accent-blue); }
  .empty { padding: 10px 12px; font-size: 12px; color: var(--text-secondary); }
</style>
</head>
<body>
<div id="listRoot" class="list"></div>
<script>
  const listRoot = document.getElementById('listRoot');

  window.brioAPI.onDropdownData(({ items, selectedId }) => {
    listRoot.innerHTML = '';
    if (!items || items.length === 0) {
      const el = document.createElement('div');
      el.className = 'empty';
      el.textContent = 'No projects yet';
      listRoot.appendChild(el);
      return;
    }
    items.forEach((p) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'item' + (selectedId === p.id ? ' selected' : '');
      btn.textContent = p.name;
      btn.dataset.id = p.id;
      btn.dataset.name = p.name;
      btn.addEventListener('click', () => {
        window.brioAPI.selectProject({ id: p.id, name: p.name });
      });
      listRoot.appendChild(btn);
    });
  });

</script>
</body>
</html>
