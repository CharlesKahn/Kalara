<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="styles.css">
<style>
  body {
    background: transparent;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    animation: none;
  }

  #pill {
    width: 100%;
    height: 100%;
    background: var(--card-bg);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    border-radius: 14px;
    border: 1px solid var(--glass-border-strong);
    display: flex;
    align-items: center;
    padding: 0 18px;
    gap: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .search-icon {
    flex-shrink: 0;
    opacity: 0.3;
    display: flex;
    align-items: center;
  }

  .search-icon svg {
    width: 17px;
    height: 17px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    color: var(--text-primary);
  }

  #queryInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-size: 15px;
    font-weight: 400;
    color: var(--text-primary);
    caret-color: var(--accent-blue);
    letter-spacing: 0.01em;
  }

  #queryInput::placeholder {
    color: var(--text-secondary);
  }

  .hint {
    flex-shrink: 0;
    font-size: 11px;
    color: var(--text-secondary);
    opacity: 0.6;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<div id="pill">
  <span class="search-icon">
    <svg viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="7"/>
      <line x1="16.5" y1="16.5" x2="22" y2="22"/>
    </svg>
  </span>
  <input id="queryInput" type="text" placeholder="Ask anything…" autocomplete="off" spellcheck="false" />
  <span class="hint">esc to close</span>
</div>

<script>
  const input = document.getElementById('queryInput');

  window.addEventListener('focus', () => input.focus());
  input.focus();

  window.brioAPI.onSpotlightClear(() => {
    input.value = '';
    input.focus();
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      input.value = '';
      window.brioAPI.closeSpotlight();
    }
    if (e.key === 'Enter') {
      const question = input.value.trim();
      if (!question) return;
      input.value = '';
      window.brioAPI.submitSpotlightQuery(question);
    }
  });

  // Theme
  window.brioAPI.getConfig().then(c => document.documentElement.setAttribute('data-theme', c?.theme || 'dark')).catch(() => {});
  window.brioAPI.onThemeChange(t => document.documentElement.setAttribute('data-theme', t));
</script>
</body>
</html>
