<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: rgba(18, 18, 22, 0.93);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.10);
    border-radius: 10px;
    color: rgba(255, 255, 255, 0.85);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 12.5px;
    padding: 0 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    height: 100vh;
    user-select: none;
    -webkit-app-region: drag;
    overflow: hidden;
  }
  .icon { font-size: 13px; flex-shrink: 0; opacity: 0.8; }
  .msg { line-height: 1.35; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <span class="icon">✓</span>
  <span class="msg" id="msg"></span>
  <script>
    document.getElementById('msg').textContent =
      new URLSearchParams(window.location.search).get('msg') || '';
  </script>
</body>
</html>
