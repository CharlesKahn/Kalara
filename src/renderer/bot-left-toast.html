<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="styles.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: transparent;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .toast {
    width: 100%;
    height: 100%;
    background: rgba(18, 18, 26, 0.96);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .toast-body {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 14px;
    min-width: 0;
  }

  .toast-icon { font-size: 15px; flex-shrink: 0; }

  .toast-text {
    flex: 1;
    font-size: 12.5px;
    color: rgba(255,255,255,0.75);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }

  .toast-title {
    font-weight: 500;
    color: rgba(255,255,255,0.92);
  }

  .toast-actions {
    display: flex;
    gap: 6px;
    padding: 0 14px 10px;
    flex-shrink: 0;
  }

  .btn {
    flex: 1;
    padding: 5px 0;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.1);
    transition: all 0.12s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }

  .btn-summary {
    background: rgba(99,102,241,0.18);
    border-color: rgba(99,102,241,0.35);
    color: rgba(255,255,255,0.75);
  }
  .btn-summary:hover:not(:disabled) {
    background: rgba(99,102,241,0.3);
    color: rgba(255,255,255,0.92);
  }
  .btn-summary:disabled {
    opacity: 0.5;
    cursor: default;
  }
  .btn-summary.ready {
    border-color: rgba(99,102,241,0.6);
    color: rgba(255,255,255,0.9);
    cursor: pointer;
    opacity: 1;
  }

  .btn-dismiss {
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.45);
  }
  .btn-dismiss:hover {
    background: rgba(239,68,68,0.1);
    border-color: rgba(239,68,68,0.25);
    color: #f87171;
  }

  .spinner {
    width: 10px; height: 10px;
    border: 1.5px solid rgba(99,102,241,0.3);
    border-top-color: rgba(99,102,241,0.8);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .progress-track {
    height: 2px;
    background: rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent-blue, #6366f1);
    width: 100%;
  }
</style>
</head>
<body>

<div class="toast">
  <div class="toast-body">
    <span class="toast-icon">🤖</span>
    <div class="toast-text" id="toastText">Kalara left <span class="toast-title" id="meetingTitle">the call</span></div>
  </div>
  <div class="toast-actions">
    <button class="btn btn-summary" id="btnSummary" disabled>
      <span class="spinner" id="spinner"></span>
      <span id="summaryLabel">View Summary</span>
    </button>
    <button class="btn btn-dismiss" id="btnDismiss">Dismiss</button>
  </div>
  <div class="progress-track">
    <div class="progress-bar" id="progressBar"></div>
  </div>
</div>

<script>
  let callId = null;
  let projectId = null;
  let pollInterval = null;
  let pollElapsed = 0;
  const POLL_INTERVAL_MS = 2000;
  const POLL_TIMEOUT_MS = 30000;

  document.getElementById('btnDismiss').addEventListener('click', () => window.close());

  document.getElementById('btnSummary').addEventListener('click', () => {
    if (callId && projectId) {
      window.brioAPI.openCallSummary(callId, projectId);
      window.close();
    }
  });

  function startPolling() {
    if (!callId) return;
    pollInterval = setInterval(async () => {
      pollElapsed += POLL_INTERVAL_MS;
      if (pollElapsed >= POLL_TIMEOUT_MS) {
        clearInterval(pollInterval);
        // Timeout: disable button, remove spinner
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('summaryLabel').textContent = 'Summary unavailable';
        return;
      }
      try {
        const res = await fetch(`http://localhost:3847/session/summary-status/${callId}`);
        const data = await res.json();
        if (data.ready) {
          clearInterval(pollInterval);
          projectId = data.projectId || projectId;
          document.getElementById('spinner').style.display = 'none';
          const btn = document.getElementById('btnSummary');
          btn.disabled = false;
          btn.classList.add('ready');
        }
      } catch (e) {}
    }, POLL_INTERVAL_MS);
  }

  window.brioAPI.onBotLeftToast((data) => {
    callId = data.callId || null;
    projectId = data.projectId || null;

    if (data.title) {
      document.getElementById('toastText').innerHTML =
        'Kalara left \u00b7 <span class="toast-title" id="meetingTitle"></span>';
      document.getElementById('meetingTitle').textContent = data.title;
    }

    // Only show summary button if we have a callId to look up
    if (callId) {
      startPolling();
    } else {
      document.getElementById('btnSummary').style.display = 'none';
    }
  });

  window.brioAPI.getConfig()
    .then(c => document.documentElement.setAttribute('data-theme', c?.theme || 'dark'))
    .catch(() => {});
</script>
</body>
</html>
