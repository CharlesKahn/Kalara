<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="styles.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: transparent;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    width: 100%;
    background: rgba(18, 18, 26, 0.97);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    overflow: hidden;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 14px 12px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .title {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    padding: 0 4px 2px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  .session-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 80ms;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .session-item:hover {
    background: rgba(239,68,68,0.08);
    border-color: rgba(239,68,68,0.2);
  }

  .session-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent-green, #22c55e);
    flex-shrink: 0;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%       { transform: scale(1.3); opacity: 0.75; }
  }
  .session-dot.bot-only { background: #a855f7; }

  .session-info { flex: 1; min-width: 0; }
  .session-url {
    font-size: 12px;
    color: rgba(255,255,255,0.85);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .session-type {
    font-size: 10.5px;
    color: rgba(255,255,255,0.4);
    margin-top: 2px;
  }

  .end-label {
    font-size: 11px;
    color: rgba(239,68,68,0.7);
    flex-shrink: 0;
  }
  .session-item:hover .end-label { color: #ef4444; }

  .sep { height: 1px; background: rgba(255,255,255,0.07); margin: 2px 0; }

  .end-all {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 7px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    color: rgba(239,68,68,0.7);
    transition: background 80ms, color 80ms;
    border: 1px solid rgba(239,68,68,0.15);
  }
  .end-all:hover { background: rgba(239,68,68,0.1); color: #ef4444; }

  .cancel-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 5px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    transition: color 80ms;
  }
  .cancel-btn:hover { color: rgba(255,255,255,0.65); }
</style>
</head>
<body>

<div class="card">
  <div class="title">End which session?</div>
  <div id="sessionList"></div>
  <div class="sep"></div>
  <div class="end-all" id="endAll">End All Sessions</div>
  <div class="cancel-btn" id="cancelBtn">Cancel</div>
</div>

<script>
  let sessions = [];

  function truncateUrl(url) {
    if (!url) return 'Unknown meeting';
    try {
      const u = new URL(url);
      return u.hostname + (u.pathname !== '/' ? u.pathname.slice(0, 30) : '');
    } catch (e) { return url.slice(0, 40); }
  }

  function renderSessions(list) {
    sessions = list;
    const container = document.getElementById('sessionList');
    container.innerHTML = '';
    list.forEach(s => {
      const row = document.createElement('div');
      row.className = 'session-item';
      row.innerHTML = `
        <div class="session-dot${s.botOnly ? ' bot-only' : ''}"></div>
        <div class="session-info">
          <div class="session-url">${truncateUrl(s.meetingUrl)}</div>
          <div class="session-type">${s.botOnly ? 'Bot only' : 'Active session'}</div>
        </div>
        <span class="end-label">End</span>
      `;
      row.addEventListener('click', async () => {
        await window.brioAPI.endSession(s.botId).catch(() => {});
        window.close();
      });
      container.appendChild(row);
    });
  }

  window.brioAPI.onSessionList(renderSessions);

  document.getElementById('endAll').addEventListener('click', async () => {
    for (const s of sessions) {
      await window.brioAPI.endSession(s.botId).catch(() => {});
    }
    window.close();
  });

  document.getElementById('cancelBtn').addEventListener('click', () => window.close());

  window.brioAPI.getConfig()
    .then(c => document.documentElement.setAttribute('data-theme', c?.theme || 'dark'))
    .catch(() => {});
</script>
</body>
</html>
