<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="styles.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: transparent;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .toast {
    width: 100%;
    height: 100%;
    background: rgba(18, 18, 26, 0.96);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .toast-body {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 14px;
    min-width: 0;
  }

  .toast-icon { font-size: 15px; flex-shrink: 0; }

  .toast-text {
    flex: 1;
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }

  .countdown {
    font-variant-numeric: tabular-nums;
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    flex-shrink: 0;
    margin-left: 2px;
  }

  .btn-keep {
    padding: 4px 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    color: rgba(255,255,255,0.7);
    font-size: 11px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.12s;
  }
  .btn-keep:hover {
    background: rgba(99,102,241,0.2);
    border-color: rgba(99,102,241,0.4);
    color: #a5b4fc;
  }

  .progress-track {
    height: 2px;
    background: rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  .progress-bar {
    height: 100%;
    background: var(--accent-red, #ef4444);
    width: 100%;
    transition: width 60s linear;
  }
</style>
</head>
<body>

<div class="toast">
  <div class="toast-body">
    <span class="toast-icon">📵</span>
    <div class="toast-text">You left the call. Ending session in <span class="countdown" id="countdown">60s</span></div>
    <button class="btn-keep" id="btnKeep">Keep Active</button>
  </div>
  <div class="progress-track">
    <div class="progress-bar" id="progressBar"></div>
  </div>
</div>

<script>
  let botId = null;
  let secondsLeft = 60;
  let countdownTimer = null;

  const countdownEl = document.getElementById('countdown');

  function startCountdown() {
    countdownTimer = setInterval(() => {
      secondsLeft--;
      countdownEl.textContent = secondsLeft + 's';
      if (secondsLeft <= 0) {
        clearInterval(countdownTimer);
        window.brioAPI.endSession(botId).catch(() => {}).finally(() => window.close());
      }
    }, 1000);
  }

  document.getElementById('btnKeep').addEventListener('click', () => {
    clearInterval(countdownTimer);
    window.brioAPI.keepSessionActive();
    window.close();
  });

  window.brioAPI.onAutoEndToast((data) => {
    botId = data.botId || null;
  });

  // Drain progress bar over 60s then close
  requestAnimationFrame(() => {
    document.getElementById('progressBar').style.width = '0%';
  });

  startCountdown();

  window.brioAPI.getConfig()
    .then(c => document.documentElement.setAttribute('data-theme', c?.theme || 'dark'))
    .catch(() => {});
</script>
</body>
</html>
